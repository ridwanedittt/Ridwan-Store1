<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPlan Pro - Super Fast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F9FBFF; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #4f46e5; transform: scale(1.1); }
        .active-date { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body class="pb-32">

    <!-- Header -->
    <nav class="bg-white/90 backdrop-blur-xl border-b border-slate-100 sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <div>
            <h1 class="text-xl font-black text-indigo-600 tracking-tight italic">ProPlan.</h1>
            <p id="header-date" class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full mt-1"></p>
        </div>
        <div class="flex gap-2">
            <div class="flex items-center gap-1.5 bg-orange-50 border border-orange-100 px-3 py-1.5 rounded-2xl">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
                <span id="streak-count" class="text-sm font-black text-orange-600">0</span>
            </div>
            <div class="flex items-center gap-1.5 bg-yellow-50 border border-yellow-200 px-3 py-1.5 rounded-2xl">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <span id="weekly-streak-count" class="text-sm font-black text-yellow-700">0</span>
            </div>
        </div>
    </nav>

    <main id="main-content" class="max-w-md mx-auto px-6 pt-6">
        <!-- Content will be injected here -->
    </main>

    <!-- Navigation -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-2xl border-t border-slate-100 px-8 py-5 z-50 shadow-lg">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button onclick="changeTab('agenda')" id="nav-agenda" class="flex flex-col items-center gap-1.5 text-slate-300">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
                <span class="text-[8px] font-black uppercase">Agenda</span>
            </button>
            <button onclick="changeTab('history')" id="nav-history" class="flex flex-col items-center gap-1.5 text-slate-300">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                <span class="text-[8px] font-black uppercase">Galeri</span>
            </button>
            <button onclick="changeTab('targets')" id="nav-targets" class="flex flex-col items-center gap-1.5 text-slate-300">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <span class="text-[8px] font-black uppercase">Target</span>
            </button>
        </div>
    </footer>

    <!-- Toast -->
    <div id="toast" class="fixed top-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-2xl z-[100] hidden"></div>

    <script>
        // --- State ---
        let tasks = JSON.parse(localStorage.getItem('pp_tasks') || '[]');
        let history = JSON.parse(localStorage.getItem('pp_hist') || '[]');
        let weeklyTargets = JSON.parse(localStorage.getItem('pp_targets') || '[]');
        let streak = parseInt(localStorage.getItem('pp_streak') || '0');
        let weeklyStreak = parseInt(localStorage.getItem('pp_wstreak') || '0');
        let lastDate = localStorage.getItem('pp_ldate');
        let lastWeek = localStorage.getItem('pp_lweek');
        
        const getTodayISO = () => new Date().toISOString().split('T')[0];
        let selectedDate = getTodayISO();
        let activeTab = 'agenda';

        // --- Logic ---
        function saveData() {
            localStorage.setItem('pp_tasks', JSON.stringify(tasks));
            localStorage.setItem('pp_hist', JSON.stringify(history));
            localStorage.setItem('pp_targets', JSON.stringify(weeklyTargets));
            localStorage.setItem('pp_streak', streak.toString());
            localStorage.setItem('pp_wstreak', weeklyStreak.toString());
            localStorage.setItem('pp_ldate', lastDate || '');
            localStorage.setItem('pp_lweek', lastWeek || '');
            updateHeader();
        }

        function triggerToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function updateHeader() {
            document.getElementById('header-date').innerText = `Hari Ini: ${new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' })}`;
            document.getElementById('streak-count').innerText = streak;
            document.getElementById('weekly-streak-count').innerText = weeklyStreak;
        }

        function changeTab(tab) {
            activeTab = tab;
            ['nav-agenda', 'nav-history', 'nav-targets'].forEach(id => {
                document.getElementById(id).classList.remove('active-tab');
            });
            document.getElementById(`nav-${tab}`).classList.add('active-tab');
            render();
        }

        function addTask() {
            const name = document.getElementById('task-name').value;
            const time = document.getElementById('task-time').value;
            if (!name || !time) return;
            tasks.push({ id: Date.now(), name, time, date: selectedDate, completed: false, proof: null });
            tasks.sort((a, b) => a.time.localeCompare(b.time));
            saveData();
            render();
        }

        function toggleTask(id) {
            tasks = tasks.map(t => {
                if (t.id === id) {
                    const updated = { ...t, completed: !t.completed };
                    if (updated.completed && t.date === getTodayISO()) {
                        if (lastDate !== getTodayISO()) {
                            streak++;
                            lastDate = getTodayISO();
                            triggerToast("Streak Harian! 🔥");
                        }
                    }
                    return updated;
                }
                return t;
            });
            saveData();
            render();
        }

        function handleUpload(id, input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    tasks = tasks.map(t => {
                        if (t.id === id) {
                            const up = { ...t, proof: reader.result, completed: true };
                            if (t.date === getTodayISO() && lastDate !== getTodayISO()) {
                                streak++;
                                lastDate = getTodayISO();
                            }
                            history.unshift({ ...up, completedAt: getTodayISO(), hId: Date.now() });
                            return up;
                        }
                        return t;
                    });
                    saveData();
                    render();
                    triggerToast("Bukti Tersimpan! 📸");
                };
                reader.readAsDataURL(file);
            }
        }

        function addWeeklyTarget() {
            const val = document.getElementById('target-input').value;
            if (!val) return;
            weeklyTargets.push({ id: Date.now(), text: val, completed: false });
            saveData();
            render();
        }

        function toggleTarget(id) {
            weeklyTargets = weeklyTargets.map(t => {
                if (t.id === id) {
                    const up = { ...t, completed: !t.completed };
                    if (up.completed) {
                        const weekId = 'W' + Math.ceil(new Date().getDate() / 7);
                        if (lastWeek !== weekId) {
                            weeklyStreak++;
                            lastWeek = weekId;
                            triggerToast("Bintang Mingguan! ⭐");
                        }
                    }
                    return up;
                }
                return t;
            });
            saveData();
            render();
        }

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';

            if (activeTab === 'agenda') {
                // Date Strip
                let dateHtml = `<div class="flex gap-2 overflow-x-auto no-scrollbar pb-2 mb-6">`;
                for (let i = 0; i < 7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    const iso = d.toISOString().split('T')[0];
                    const isActive = selectedDate === iso;
                    dateHtml += `
                        <button onclick="selectedDate='${iso}'; render();" class="min-w-[65px] py-3 rounded-2xl flex flex-col items-center transition-all ${isActive ? 'active-date' : 'bg-white text-slate-400 border border-slate-100'}">
                            <span class="text-[9px] font-bold uppercase">${iso === getTodayISO() ? 'Hari Ini' : d.toLocaleDateString('id-ID', { weekday: 'short' })}</span>
                            <span class="text-lg font-black">${d.getDate()}</span>
                        </button>`;
                }
                dateHtml += `</div>`;

                const filtered = tasks.filter(t => t.date === selectedDate);
                const progress = filtered.length > 0 ? Math.round((filtered.filter(t => t.completed).length / filtered.length) * 100) : 0;

                main.innerHTML = dateHtml + `
                    <div class="bg-white p-5 rounded-[2rem] border border-slate-100 mb-6">
                        <div class="flex justify-between items-center mb-3 text-[10px] font-black text-slate-400 uppercase">
                            <span>Progres: ${new Date(selectedDate).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' })}</span>
                            <span class="text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">${progress}%</span>
                        </div>
                        <div class="w-full bg-slate-50 h-2 rounded-full overflow-hidden">
                            <div class="bg-indigo-600 h-full transition-all duration-700" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 mb-6">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Tambah Agenda</h3>
                        <div class="space-y-3">
                            <input id="task-name" type="text" placeholder="Apa rencana Anda?" class="w-full bg-slate-50 p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                            <div class="flex gap-2">
                                <input id="task-time" type="time" class="flex-1 bg-slate-50 p-4 rounded-2xl text-sm outline-none">
                                <button onclick="addTask()" class="bg-indigo-600 text-white p-4 rounded-2xl">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-4">
                        ${filtered.length === 0 ? '<p class="text-center py-10 opacity-20 font-bold">Belum ada agenda</p>' : 
                        filtered.map(t => `
                            <div class="bg-white p-5 rounded-[2rem] border border-slate-100 flex flex-col gap-4">
                                <div class="flex justify-between items-start">
                                    <div class="flex gap-3">
                                        <button onclick="toggleTask(${t.id})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${t.completed ? 'bg-emerald-500 border-emerald-500' : 'border-slate-200'}">
                                            ${t.completed ? '<span class="text-white text-[10px]">✓</span>' : ''}
                                        </button>
                                        <div>
                                            <h4 class="font-bold text-sm ${t.completed ? 'line-through text-slate-400' : ''}">${t.name}</h4>
                                            <p class="text-[10px] text-slate-400 font-bold uppercase">${t.time}</p>
                                        </div>
                                    </div>
                                    <button onclick="tasks=tasks.filter(x=>x.id!==${t.id});saveData();render();" class="text-slate-200">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                    </button>
                                </div>
                                ${!t.proof ? `
                                    <label class="bg-slate-50 border-2 border-dashed border-slate-200 py-3 rounded-2xl flex items-center justify-center gap-2 cursor-pointer">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase">Unggah Bukti</span>
                                        <input type="file" class="hidden" accept="image/*" onchange="handleUpload(${t.id}, this)">
                                    </label>` : `<img src="${t.proof}" class="w-full h-32 object-cover rounded-2xl">`}
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (activeTab === 'targets') {
                main.innerHTML = `
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 mb-6">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Target Mingguan ⭐</h3>
                        <div class="flex gap-2">
                            <input id="target-input" type="text" placeholder="Target besar minggu ini..." class="flex-1 bg-slate-50 p-4 rounded-2xl text-sm outline-none">
                            <button onclick="addWeeklyTarget()" class="bg-indigo-600 text-white p-4 rounded-2xl">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
                            </button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${weeklyTargets.map(t => `
                            <div class="bg-white p-4 rounded-[1.5rem] border border-slate-100 flex items-center justify-between shadow-sm">
                                <div class="flex items-center gap-3">
                                    <button onclick="toggleTarget(${t.id})" class="w-6 h-6 rounded-lg border-2 flex items-center justify-center ${t.completed ? 'bg-yellow-500 border-yellow-500' : 'border-slate-200'}">
                                        ${t.completed ? '<span class="text-white text-[10px]">★</span>' : ''}
                                    </button>
                                    <span class="text-sm font-bold ${t.completed ? 'line-through text-slate-400' : ''}">${t.text}</span>
                                </div>
                                <button onclick="weeklyTargets=weeklyTargets.filter(x=>x.id!==${t.id});saveData();render();" class="text-slate-200">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (activeTab === 'history') {
                main.innerHTML = `
                    <div class="flex items-center justify-between px-2 mb-6">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Koleksi Bukti</h3>
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">${history.length} Item</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        ${history.map(item => `
                            <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm">
                                <img src="${item.proof}" class="w-full aspect-square object-cover">
                                <div class="p-4">
                                    <p class="text-[10px] font-black truncate">${item.name}</p>
                                    <p class="text-[8px] text-indigo-500 font-bold uppercase">${item.completedAt}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // Init
        updateHeader();
        changeTab('agenda');
    </script>
</body>
                </html>
